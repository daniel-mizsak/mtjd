---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

# See https://prek.j178.dev to learn about prek

# exclude: ""

# pre-commit
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # frozen: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=2000, --enforce-all]
      - id: check-json
        exclude: "dotfiles/vscode/settings.json"
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: detect-private-key
      - id: end-of-file-fixer
        exclude: "dotfiles/config/karabiner/karabiner.json"
      - id: trailing-whitespace

  # shellcheck
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: 99470f5e12208ff0fb17ab81c3c494f7620a1d8d # frozen: v0.11.0
    hooks:
      - id: shellcheck
        types: [shell]
        args: [--external-sources, --exclude=SC1091]
        exclude: "dotfiles/shell/zsh/.zshrc"

  # actionlint
  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint

  # zizmor
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: a4727cbbcd26d7098e96b9cb738169b59711ae51 # frozen: v1.24.1
    hooks:
      - id: zizmor

  # yamllint
  - repo: https://github.com/adrienverge/yamllint.git
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530 # frozen: v1.38.0
    hooks:
      - id: yamllint
        args: [--config-file=.github/linters/.yamllint.yml, --strict]

  # gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e # frozen: v8.30.1
    hooks:
      - id: gitleaks

  # codespell
  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # frozen: v2.4.2
    hooks:
      - id: codespell
        exclude: "dotfiles/config"

  # alejandra
  - repo: https://github.com/kamadorueda/alejandra
    rev: 3e2a85506627062313e131bf8a85315f3387c8e0 # frozen: 4.0.0
    hooks:
      - id: alejandra-system

  # prettier
  - repo: local
    hooks:
      - id: run-prettier
        name: Run Prettier
        language: system
        entry: |
          prettier --write .
